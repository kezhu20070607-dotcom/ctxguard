name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build on ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ctxguard-linux-x86_64
            binary: ctxguard
            allow_failure: false
          - target: x86_64-apple-darwin
            os: macos-13   # x86_64
            artifact: ctxguard-macos-x86_64
            binary: ctxguard
            allow_failure: true   # macos runner queue can be 10+ min
          - target: aarch64-apple-darwin
            os: macos-latest  # arm64
            artifact: ctxguard-macos-aarch64
            binary: ctxguard
            allow_failure: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ctxguard-windows-x86_64.exe
            binary: ctxguard.exe
            allow_failure: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ctxguard -> target
      - run: cargo build --release --locked
      - name: Package
        # Windows bsdtar treats `2>/dev/null` as a literal `null` path and dies
        # with "Could not find a part of the path 'D:\dev\null'". Use platform-
        # aware archive: PowerShell Compress-Archive on Windows, tar everywhere else.
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.binary }} dist/${{ matrix.artifact }}
          if [ "$RUNNER_OS" = "Windows" ]; then
            cd dist && powershell -NoProfile -Command "Compress-Archive -Force -Path '${{ matrix.artifact }}' -DestinationPath '${{ matrix.artifact }}.zip'" && cd ..
          else
            tar -C dist -czf dist/${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.zip
