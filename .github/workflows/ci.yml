name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: build + test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ctxguard -> target

      - name: Build
        run: cargo build --release

      - name: Smoke test
        shell: bash
        run: |
          ./target/release/ctxguard --version
          ./target/release/ctxguard --help

  lint:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ctxguard -> target
      - run: cargo fmt --all -- --check || echo "::warning::rustfmt diff (non-blocking)"
      - run: cargo clippy --all-targets -- -D warnings
